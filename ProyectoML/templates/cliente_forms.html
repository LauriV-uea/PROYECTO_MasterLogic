{% extends "base.html" %}

{% block contenido %}
{% set c = cliente if cliente else {} %}
<style>
.form-card{
    max-width:760px;
    margin:20px auto;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:0 12px 32px rgba(0,0,0,0.08);
    padding:20px 22px;
}
.form-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}
.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:12px 16px;
}
.form-grid label{
    font-weight:600;
    color:var(--muted);
    font-size:14px;
}
.input-box{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:14px;
}
.form-actions{
    margin-top:16px;
    display:flex;
    gap:12px;
    align-items:center;
}
.btn-primary{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:10px 16px;
    cursor:pointer;
    font-weight:700;
}
.btn-ghost{
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
}
</style>

<div class="form-card">
    <div class="form-head">
        <div>
            <p class="muted" style="margin:0;font-size:13px;">Clientes • MasterLogic</p>
            <h2 style="margin:2px 0 0;">{{ 'Editar Cliente' if cliente else 'Nuevo Cliente' }}</h2>
        </div>
    </div>

    <form method="POST" novalidate>
        <div class="form-grid">
            <div>
                <label>Nombre</label>
                <input class="input-box" type="text" name="nombre" value="{{ c['nombre'] if c else '' }}" required>
            </div>
            <div>
                <label>Apellidos</label>
                <input class="input-box" type="text" name="apellidos" value="{{ c['apellidos'] if c else '' }}">
            </div>
            <div>
                <label>Correo</label>
                <input class="input-box" type="email" name="correo" value="{{ c['correo'] if c else '' }}">
            </div>
            <div>
                <label>Teléfono</label>
                <input class="input-box" type="tel" name="telefono"
                       inputmode="numeric" pattern="\\d{10}" maxlength="10"
                       oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                       value="{{ c['telefono'] if c else '' }}">
            </div>
            <div>
                <label>Dirección</label>
                <input class="input-box" type="text" name="direccion" value="{{ c['direccion'] if c else '' }}">
            </div>
            <div>
                <label>DNI</label>
                <input class="input-box" type="text" name="dni"
                       inputmode="numeric" pattern="\\d{10}" maxlength="10"
                       oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                       value="{{ c['dni'] if c else '' }}">
            </div>
        </div>

        <div class="form-actions">
            <button class="btn-primary" type="submit">Guardar cambios</button>
            <a class="btn-ghost" href="{{ url_for('clientes') }}">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
