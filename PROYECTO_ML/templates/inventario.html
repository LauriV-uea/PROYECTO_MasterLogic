{% extends "base.html" %}
{% block content %}
<h2>Inventario</h2>

<!--Formulario paraañadir producto-->
<form method="POST">
    <input type="number" name="id" placeholder="ID" required></input>
    <input type="text" name="nombre" placeholder="Nombre" required></input>
    <input type="number" name="cantidad" placeholder="Cantidad" required></input>
    <input type="number" name="precio" placeholder="Precio" required></input>
    <button type="submit">Agregar</button>
</form>


 <h3>Eliminar Producto</h3>
<form method="POST" action="/eliminar">
    <input type="number" name="id" placeholder="ID a eliminar" required>
    <button type="submit">Eliminar</button>
</form>

 <h3>Buscar Producto</h3>
<form method="GET" action="/buscar">
    <input type="text" name="nombre" placeholder="Nombre del producto" required>
    <button type="submit">Buscar</button>
</form>

<h3>Actualizar Producto</h3>
<form method="POST" action="/actualizar">
    <input type="number" name="id" placeholder="ID del producto" required>
    <input type="number" name="cantidad" placeholder="Nueva cantidad" required>
    <input type="number" step="0.01" name="precio" placeholder="Nuevo precio" required>
    <button type="submit">Actualizar</button>
</form>

<!--tabla para mostar productos-->
<h3>Lista de Productos</h3>
<table border="1">
<tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Cantidad</th>
    <th>Precio</th>
</tr>

>{% for producto in productos %}
<tr>
    <td>{{ producto[0] }}</td>
    <td>{{ producto[1] }}</td>
    <td>{{ producto[2] }}</td>
    <td>{{ producto[3] }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
